name: Auto Fix (Simple)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff
    
    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
    
    - name: Debug Git Status
      run: |
        echo "Git status before fixes:"
        git status
        echo "---"
    
    - name: Fix trailing whitespace
      run: |
        find src -name "*.py" -exec sed -i 's/[[:space:]]*$//' {} +
    
    - name: Auto-fix with ruff
      run: |
        ruff check --fix src/ || true
    
    - name: Format with black
      run: |
        black src/ tests/ || true
    
    - name: Check for changes
      id: check-changes
      run: |
        echo "Git status after fixes:"
        git status --short
        if [ -n "$(git status --porcelain)" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "Changes detected"
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "No changes detected"
        fi
    
    - name: Debug before push
      if: steps.check-changes.outputs.has_changes == 'true'
      run: |
        echo "Git config:"
        git config user.name
        git config user.email
        echo "Current branch:"
        git branch --show-current
        echo "Remote info:"
        git remote -v
    
    - name: Commit and push directly
      if: steps.check-changes.outputs.has_changes == 'true'
      run: |
        git add -A
        git commit -m "style: Auto-fix lint and formatting issues [skip ci]"
        git push origin HEAD:main
        echo "✅ Changes pushed successfully"
