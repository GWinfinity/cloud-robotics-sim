name: Auto Fix

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff
    
    - name: Fix trailing whitespace
      run: |
        find src -name "*.py" -exec sed -i 's/[[:space:]]*$//' {} +
    
    - name: Auto-fix with ruff
      run: |
        ruff check --fix src/ || true
    
    - name: Format with black
      run: |
        black src/ tests/ || true
    
    - name: Check for changes
      id: check-changes
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Create Pull Request
      if: steps.check-changes.outputs.has_changes == 'true'
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "style: Auto-fix lint and formatting issues"
        title: "🤖 Auto-fix: Lint and formatting issues"
        body: |
          This PR was automatically created to fix CI failures.
          
          Changes made:
          - Fixed trailing whitespace
          - Applied ruff auto-fixes
          - Formatted with black
          
          Please review and merge if the changes look correct.
        branch: auto-fix/ci-issues
        delete-branch: true
