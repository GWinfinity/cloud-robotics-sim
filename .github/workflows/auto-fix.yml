name: Auto Fix

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff
    
    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
    
    - name: Fix trailing whitespace
      run: |
        find src -name "*.py" -exec sed -i 's/[[:space:]]*$//' {} +
    
    - name: Auto-fix with ruff
      run: |
        ruff check --fix src/ || true
    
    - name: Format with black
      run: |
        black src/ tests/ || true
    
    - name: Check for changes
      id: check-changes
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "Changes detected:"
          git status --short
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "No changes to commit"
        fi
    
    - name: Create branch and commit
      if: steps.check-changes.outputs.has_changes == 'true'
      id: create-commit
      run: |
        BRANCH_NAME="auto-fix/ci-$(date +%Y%m%d-%H%M%S)"
        git checkout -b "$BRANCH_NAME"
        git add -A
        git commit -m "style: Auto-fix lint and formatting issues

        - Fix trailing whitespace
        - Apply ruff auto-fixes  
        - Format with black"
        git push origin "$BRANCH_NAME"
        echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
        echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
    
    - name: Create Pull Request via API
      if: steps.check-changes.outputs.has_changes == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh pr create \
          --title "🤖 Auto-fix: Lint and formatting issues" \
          --body "This PR was automatically created to fix CI failures.

        ## Changes Made
        - Fixed trailing whitespace
        - Applied ruff auto-fixes
        - Formatted with black

        Please review and merge if the changes look correct.

        ---
        *This PR was created automatically by the Auto Fix workflow.*" \
          --base main \
          --head ${{ steps.create-commit.outputs.branch_name }} \
          --label "automated,style" || echo "PR may already exist"
    
    - name: PR Create Fallback
      if: failure() && steps.check-changes.outputs.has_changes == 'true'
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "style: Auto-fix lint and formatting issues"
        title: "🤖 Auto-fix: Lint and formatting issues"
        body: |
          This PR was automatically created to fix CI failures.
          
          ## Changes Made
          - Fixed trailing whitespace
          - Applied ruff auto-fixes
          - Formatted with black
          
          Please review and merge if the changes look correct.
        branch: auto-fix/ci-issues-fallback
        delete-branch: true
        labels: automated,style
