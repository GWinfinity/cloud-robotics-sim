name: Auto Fix with PR

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix-pr:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff
    
    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
    
    - name: Fix trailing whitespace
      run: |
        find src -name "*.py" -exec sed -i 's/[[:space:]]*$//' {} +
    
    - name: Auto-fix with ruff
      run: |
        ruff check --fix src/ || true
    
    - name: Format with black
      run: |
        black src/ tests/ || true
    
    - name: Check for changes
      id: check-changes
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
        fi
    
    - name: Create branch and push
      if: steps.check-changes.outputs.has_changes == 'true'
      id: branch
      run: |
        BRANCH="auto-fix/ci-$(date +%Y%m%d-%H%M%S)"
        git checkout -b "$BRANCH"
        git add -A
        git commit -m "style: Auto-fix lint and formatting issues"
        git push origin "$BRANCH"
        echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
    
    - name: Create PR via GitHub CLI
      if: steps.check-changes.outputs.has_changes == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh pr create \
          --repo ${{ github.repository }} \
          --title "🤖 Auto-fix: Lint and formatting issues" \
          --body "This PR was automatically created to fix CI failures.

        ## Changes Made
        - Fixed trailing whitespace
        - Applied ruff auto-fixes
        - Formatted with black

        Please review and merge if the changes look correct." \
          --base main \
          --head ${{ steps.branch.outputs.branch }} \
          --label "automated,style" || echo "PR creation failed"
